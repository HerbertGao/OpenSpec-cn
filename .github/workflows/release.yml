name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# OIDC trusted publishing to npm (token-free). Requires a Trusted Publisher
# configured on npmjs.com for this package pointing at this repo + workflow.
# See PR description / docs/publishing.md for the one-time npm-side setup.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Node >= 22.14 is required for npm OIDC trusted publishing.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      # npm CLI >= 11.5.1 is required for OIDC trusted publishing; the version
      # bundled with Node 22 is older, so upgrade it explicitly.
      - name: Upgrade npm (OIDC support)
        run: npm install -g npm@latest

      - name: Verify packed version matches package.json
        run: pnpm run check:pack-version

      # Publish with npm (not pnpm): pnpm's OIDC support is unreliable.
      # No NODE_AUTH_TOKEN — auth is via GitHub OIDC + the configured
      # Trusted Publisher. Provenance attestations are attached automatically.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
